<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>LegalCraft AI</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a1428">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>
:root {
  --bg: #0a1428;
  --sb: #0f1b33;
  --surface: #13223f;
  --border: #1e355f;
  --text: #e6edf5;
  --text-muted: #8a9db8;
  --gold: #d4af37;
  --gold-dark: #b38f1f;
  --gold-dim: rgba(212, 175, 55, 0.08);
  --gold-border: rgba(212, 175, 55, 0.25);
  --accent: #3b82f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app { display: flex; height: 100vh; }

/* ==================== SIDEBAR ==================== */
.sb {
  width: 280px; background: var(--sb); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  box-shadow: 4px 0 15px rgba(0,0,0,0.3);
}

.sb-top { padding: 20px 16px 12px; }
.sb-logo {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px;
  margin-bottom: 16px;
}
.sb-logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(212,175,55,0.3);
}
.sb-logo-icon svg { width: 22px; height: 22px; fill: #0a1428; }

.sb-logo-text {
  font-size: 18px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(90deg, #e6edf5, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.new-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 10px;
  background: transparent; border: 1px solid var(--border);
  color: var(--text); font-weight: 500; font-size: 14px;
  cursor: pointer; transition: all 0.25s ease;
}
.new-btn:hover {
  background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold);
}

.sb-section {
  padding: 12px 20px 6px;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.5px;
  color: var(--text-muted); text-transform: uppercase;
}

.sb-chats {
  flex: 1; overflow-y: auto; padding: 4px 12px;
}
.sb-chats::-webkit-scrollbar { width: 4px; }
.sb-chats::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.chat-item {
  padding: 10px 14px; border-radius: 8px; margin: 3px 0;
  font-size: 13.2px; color: var(--text-muted); cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 10px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-item:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.chat-item.active {
  background: var(--gold-dim); color: var(--gold);
  border-left: 3px solid var(--gold);
}

.no-chats {
  padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px;
}

/* ==================== MAIN AREA ==================== */
.main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}

.topbar {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  background: rgba(10,20,40,0.7); backdrop-filter: blur(12px);
}
.topbar-logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.topbar-title {
  font-size: 17px; font-weight: 700; letter-spacing: -0.4px;
}
.topbar-model {
  margin-left: auto; font-size: 12px; padding: 4px 14px;
  background: rgba(212,175,55,0.1); color: var(--gold);
  border: 1px solid var(--gold-border); border-radius: 9999px;
}

/* ==================== CHAT AREA ==================== */
.chat {
  flex: 1; overflow-y: auto; padding: 24px 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.msg-row { padding: 18px 0; }
.msg-row.user { background: rgba(59,130,246,0.03); }

.msg-inner {
  max-width: 820px; margin: 0 auto; padding: 0 28px;
  display: flex; gap: 16px; align-items: flex-start;
}

.av {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; margin-top: 2px;
}
.av.ai {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  box-shadow: 0 3px 10px rgba(212,175,55,0.4);
}
.av.user { background: #2563eb; }

.body {
  flex: 1; font-size: 15px; line-height: 1.75; color: var(--text);
}
.body p { margin: 8px 0; }
.body h3 {
  font-size: 16px; color: var(--gold); margin: 18px 0 8px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.body strong { color: #fff; font-weight: 600; }
.body code {
  background: rgba(212,175,55,0.1); color: var(--gold);
  padding: 2px 7px; border-radius: 4px; font-size: 13.5px;
}

/* Welcome Screen */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; flex: 1; text-align: center; padding: 40px 20px;
}
.w-circle {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--gold-dim); border: 3px solid var(--gold-border);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.w-circle svg { width: 48px; height: 48px; fill: var(--gold); }

.w-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.8px;
  margin-bottom: 8px;
}
.w-sub {
  font-size: 15.5px; color: var(--text-muted); max-width: 520px; line-height: 1.6;
}

.w-cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px; max-width: 680px; width: 100%; margin-top: 32px;
}
.w-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; text-align: left;
  transition: all 0.3s ease; cursor: pointer;
}
.w-card:hover {
  border-color: var(--gold-border);
  background: var(--gold-dim);
  transform: translateY(-3px);
}
.w-card h4 {
  font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px;
}

/* Input Area */
.input-area { padding: 16px 24px; background: var(--bg); flex-shrink: 0; }
.input-box {
  max-width: 820px; margin: 0 auto;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 12px 16px;
  display: flex; align-items: flex-end; gap: 12px;
  transition: all 0.25s;
}
.input-box:focus-within {
  border-color: var(--gold-border);
  box-shadow: 0 0 0 4px rgba(212,175,55,0.12);
}

.ci {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 15px; color: var(--text); resize: none; min-height: 24px;
  max-height: 160px; line-height: 1.6; font-family: inherit;
}
.ci::placeholder { color: var(--text-muted); }

.up-btn, .send-btn {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.up-btn {
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
}
.up-btn:hover { background: var(--gold-dim); border-color: var(--gold-border); color: var(--gold); }

.send-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border: none;
}
.send-btn:hover { transform: scale(1.08); }

/* Other elements (img bar, draft, sources, etc.) will be improved in next steps */

@media (max-width: 768px) {
  .sb { display: none; }
  .w-cards { grid-template-columns: 1fr; }
}
</style>
</head>

      <div style="text-align:center; margin-top:8px; font-size:11px; color:var(--text-muted);">
        LegalCraft AI • Court-Ready • BNS • BNSS • BSA 2023

    </div>
  </div>
</div>
